<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DAKKAI Sushi — Brasil · Oriente</title>
<meta name="description" content="DAKKAI Sushi. Onde o Brasil encontra o Oriente. Cardápio, delivery e reservas.">
<meta name="keywords" content="sushi, dakkai, restaurante japonês, delivery sushi, Florianópolis">
<link rel="shortcut icon" href="logo.png">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;600;700&family=Manrope:wght@400;500&display=swap" rel="stylesheet">

<style>
:root{
  --preto:#040404;
  --osso:#f3efe8;
  --vermelho:#b02218;
  --vermelho-claro:#d03528;
  --cinza:#8a857d;
  --linha:#1c1815;
}

*{ margin:0; padding:0; box-sizing:border-box; }

html,body{ height:100%; }

body{
  background:var(--preto);
  color:var(--osso);
  font-family:"Manrope", Helvetica, Arial, sans-serif;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  min-height:100dvh;
  padding:32px 20px;
  /* brilho vermelho muito sutil atrás do logo */
  background-image:radial-gradient(ellipse 60% 45% at 50% 38%, rgba(176,34,24,.10), transparent 70%);
}

.conteudo{
  display:flex;
  flex-direction:column;
  align-items:center;
  text-align:center;
  width:100%;
  max-width:560px;
}

/* ---------- LOGO ---------- */
.logo{
  width:min(420px, 82vw);
  height:auto;
  display:block;
  opacity:0;
  animation:surgir 1.1s ease .15s forwards;
}

/* ---------- BOTÕES ---------- */
nav{
  display:flex;
  flex-direction:column;
  gap:14px;
  width:100%;
  max-width:340px;
  margin-top:34px;
}

.botao{
  font-family:"Rajdhani", sans-serif;
  font-weight:600;
  font-size:15px;
  letter-spacing:.35em;
  text-indent:.35em; /* compensa o letter-spacing para centralizar de verdade */
  text-transform:uppercase;
  color:var(--osso);
  text-decoration:none;
  border:1px solid rgba(243,239,232,.28);
  padding:15px 10px;
  position:relative;
  overflow:hidden;
  transition:color .25s ease, border-color .25s ease;
  opacity:0;
  animation:surgir .7s ease forwards;
}

/* entrada em sequência, um botão de cada vez */
nav .botao:nth-child(1){ animation-delay:.55s; }
nav .botao:nth-child(2){ animation-delay:.70s; }
nav .botao:nth-child(3){ animation-delay:.85s; }
nav .botao:nth-child(4){ animation-delay:1.00s; }

/* pincelada vermelha que preenche no hover — o gesto do enso */
.botao::before{
  content:"";
  position:absolute;
  inset:0;
  background:linear-gradient(100deg, var(--vermelho) 0%, var(--vermelho-claro) 55%, var(--vermelho) 100%);
  transform:scaleX(0);
  transform-origin:left center;
  transition:transform .3s cubic-bezier(.65,0,.35,1);
  z-index:-1;
}

.botao:hover,
.botao:focus-visible{
  color:#fff;
  border-color:var(--vermelho);
  outline:none;
}

.botao:hover::before,
.botao:focus-visible::before{
  transform:scaleX(1);
}

.botao:focus-visible{
  box-shadow:0 0 0 2px var(--preto), 0 0 0 4px var(--vermelho-claro);
}

/* botão principal (delivery) já nasce marcado */
.botao.destaque{
  border-color:var(--vermelho);
  color:var(--vermelho-claro);
}
.botao.destaque:hover,
.botao.destaque:focus-visible{ color:#fff; }

/* ---------- RODAPÉ ---------- */
footer{
  margin-top:46px;
  padding-top:20px;
  border-top:1px solid var(--linha);
  width:100%;
  max-width:340px;
  font-size:12px;
  letter-spacing:.12em;
  color:var(--cinza);
  line-height:2;
  opacity:0;
  animation:surgir 1s ease 1.2s forwards;
}

footer a{
  color:var(--cinza);
  text-decoration:none;
  transition:color .2s ease;
}
footer a:hover{ color:var(--osso); }

@keyframes surgir{
  from{ opacity:0; transform:translateY(14px); }
  to{ opacity:1; transform:none; }
}

@media (prefers-reduced-motion: reduce){
  .logo, .botao, footer{ animation:none; opacity:1; }
  .botao::before{ transition:none; }
}
</style>
</head>
<body>

<main class="conteudo">
  <img class="logo" src="logo.png" alt="DAKKAI Sushi — Brasil · Oriente">

  <nav aria-label="Menu principal">
    <!-- TROQUE os href="#" pelos seus links reais -->
    <a href="#" class="botao destaque">Delivery</a>
    <a href="#" class="botao">Cardápio</a>
    <a href="#" class="botao">Reservas</a>
    <a href="#" class="botao">Trabalhe Conosco</a>
  </nav>

  <footer>
    <!-- Edite com os dados reais do restaurante -->
    Rua Exemplo, 123 · Florianópolis / SC<br>
    <a href="https://instagram.com/" target="_blank" rel="noopener">@dakkaisushi</a>
    &nbsp;·&nbsp;
    <a href="https://wa.me/5548999999999" target="_blank" rel="noopener">WhatsApp</a>
  </footer>
</main>

</body>
</html>
